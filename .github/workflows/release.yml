name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: gcc
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/pennyclaw-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/pennyclaw

      - name: Compress binary
        run: |
          cd dist
          tar czf pennyclaw-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            pennyclaw-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pennyclaw-*.tar.gz
          generate_release_notes: true
